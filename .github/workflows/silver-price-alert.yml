name: Silver Price Alert

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      test_threshold:
        description: "Override PRICE_THRESHOLD for this run only (e.g. set to 1 to force a test alert). Leave blank for normal runs."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  check-price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install -r silver_price_alert/requirements.txt

      - name: Check price
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PRICE_THRESHOLD: ${{ inputs.test_threshold }}
        run: python silver_price_alert/check_price.py

      - name: Persist state
        if: always()
        run: |
          git config user.name "price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add silver_price_alert/state.json
          git diff --cached --quiet || git commit -m "Update silver price state"
          git diff --cached --quiet || git push
